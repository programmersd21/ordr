name: CI

on:
  push:
    branches: [main]
    paths:
      - src/**
      - python/**
  pull_request:
    branches: [main]
    paths:
      - src/**
      - python/**
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install numpy typer rich ruff mypy
      - run: cargo clippy -- -D warnings
      - run: ruff format --check python/
      - run: ruff check python/
      - run: mypy python/
