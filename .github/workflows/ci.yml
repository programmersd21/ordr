name: CI

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - pyproject.toml
  pull_request:
    branches: [main]
    paths:
      - Cargo.toml
      - pyproject.toml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install maturin pytest ruff mypy
      - run: maturin develop --release
      - run: ruff format --check python/
      - run: ruff check python/
      - run: mypy python/
      - run: pytest tests/
